---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 3 # Number of pods
  selector:
    matchLabels:
      app: nginx
  template: # Pod template!
    metadata:
      labels:
        app: nginx
    spec: # Pod spec goes here
      containers:
      - name: nginx
        image: nginx:alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo 'server {
              listen 80;
              location / {
                default_type text/html;
                return 200 "<h1>$hostname</h1>";
              }
            }' > /etc/nginx/conf.d/default.conf
            nginx -g 'daemon off;'

